name: Android CI

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish GitHub Release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APKs
    uses: ./.github/workflows/build.yml
    with:
      java_version: '21'
    secrets: inherit

  release:
    name: Publish GitHub release
    needs: build
    if: ${{ inputs.publish_release }}
    uses: ./.github/workflows/release.yml
    with:
      release_tag: v${{ needs.build.outputs.version_code }}
      release_title: FuseHide Material ${{ needs.build.outputs.version_name }}
      delete_existing_assets: true
      version_name: ${{ needs.build.outputs.version_name }}
      version_code: ${{ needs.build.outputs.version_code }}
      commit_sha: ${{ needs.build.outputs.commit_sha }}
      commit_url: ${{ needs.build.outputs.commit_url }}
      build_duration: ${{ needs.build.outputs.build_duration }}
      release_apk_name: ${{ needs.build.outputs.release_apk_name }}
      debug_apk_name: ${{ needs.build.outputs.debug_apk_name }}
      release_sha256: ${{ needs.build.outputs.release_sha256 }}
      debug_sha256: ${{ needs.build.outputs.debug_sha256 }}
    secrets: inherit
